<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TRT Motors</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root {
  --blue: #1a1aff;
  --green: #1D9E75;
  --green-light: #E1F5EE;
  --amber: #BA7517;
  --amber-light: #FAEEDA;
  --red: #A32D2D;
  --red-light: #FCEBEB;
  --gold: #FFD700;
  --bg: #f4f3f0;
  --card: #ffffff;
  --border: rgba(0,0,0,0.08);
  --border-strong: rgba(0,0,0,0.15);
  --text: #1a1a1a;
  --muted: #6b6b6b;
  --faint: #9a9a9a;
  --radius: 12px;
  --radius-sm: 8px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

/* SHARED */
.header { background: var(--blue); padding: 0 24px; height: 56px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; }
.header-logo { color: #fff; font-weight: 600; font-size: 17px; letter-spacing: 0.5px; }
.live-dot { width: 6px; height: 6px; border-radius: 50%; background: #4ade80; animation: pulse 2s infinite; display: inline-block; margin-right: 5px; }
@keyframes pulse { 0%,100%{opacity:1}50%{opacity:0.4} }
.container { max-width: 1100px; margin: 0 auto; padding: 24px 20px; }
.btn { padding: 8px 18px; border-radius: 8px; font-size: 13px; font-family: inherit; font-weight: 500; cursor: pointer; border: 1px solid var(--border-strong); background: var(--card); color: var(--text); transition: all 0.15s; }
.btn:hover { background: #f0f0f0; }
.btn-primary { background: var(--blue); color: #fff; border-color: var(--blue); }
.btn-primary:hover { background: #0000cc; }
.btn-header { background: rgba(255,255,255,0.15); border: 1px solid rgba(255,255,255,0.25); color: #fff; padding: 6px 14px; border-radius: 8px; font-size: 13px; font-family: inherit; cursor: pointer; display: flex; align-items: center; gap: 6px; }
.btn-header:hover { background: rgba(255,255,255,0.25); }

/* ADMIN DASHBOARD */
#admin-view { display: none; }
.stats-grid { display: grid; grid-template-columns: repeat(4,1fr); gap: 12px; margin-bottom: 24px; }
.stat-card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px 18px; }
.stat-card.blue { border-top: 3px solid var(--blue); }
.stat-card.green { border-top: 3px solid var(--green); }
.stat-card.amber { border-top: 3px solid var(--amber); }
.stat-card.gray { border-top: 3px solid #888; }
.stat-val { font-size: 28px; font-weight: 600; line-height: 1; }
.stat-lbl { font-size: 12px; color: var(--muted); margin-top: 4px; }
.toolbar { display: flex; gap: 10px; margin-bottom: 16px; flex-wrap: wrap; }
.search-wrap { flex: 1; min-width: 200px; position: relative; }
.search-wrap input { width: 100%; padding: 8px 12px 8px 36px; border: 1px solid var(--border-strong); border-radius: var(--radius-sm); font-size: 13px; font-family: inherit; background: var(--card); }
.search-icon { position: absolute; left: 11px; top: 50%; transform: translateY(-50%); color: var(--faint); font-size: 15px; }
.filter-select { padding: 8px 12px; border: 1px solid var(--border-strong); border-radius: var(--radius-sm); font-size: 13px; font-family: inherit; background: var(--card); cursor: pointer; }
.tabs { display: flex; gap: 4px; margin-bottom: 16px; background: var(--card); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 4px; width: fit-content; }
.tab-btn { padding: 6px 16px; border-radius: 6px; border: none; background: transparent; font-size: 13px; font-family: inherit; color: var(--muted); cursor: pointer; }
.tab-btn.active { background: var(--blue); color: #fff; font-weight: 500; }
.job-card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px 16px; margin-bottom: 10px; transition: all 0.15s; }
.job-card:hover { border-color: var(--border-strong); transform: translateY(-1px); }
.job-header { display: flex; align-items: flex-start; gap: 12px; margin-bottom: 10px; }
.reg-plate { background: var(--gold); color: #1a1a1a; font-family: 'DM Mono', monospace; font-weight: 500; font-size: 13px; padding: 4px 12px; border-radius: 6px; letter-spacing: 2px; white-space: nowrap; border: 2px solid rgba(0,0,0,0.1); }
.job-info { flex: 1; min-width: 0; }
.job-name { font-size: 14px; font-weight: 600; display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
.job-vehicle { font-size: 12px; color: var(--muted); margin-top: 2px; }
.job-addr { font-size: 11px; color: var(--faint); margin-top: 1px; }
.tag { font-size: 10px; padding: 2px 7px; border-radius: 20px; font-weight: 600; }
.tag-auth { background: #E6F1FB; color: #0C447C; }
.tag-inv { background: var(--green-light); color: #0F6E56; }
.tag-no-auth { background: var(--amber-light); color: var(--amber); }
.days-pill { font-size: 11px; padding: 2px 8px; border-radius: 20px; white-space: nowrap; }
.days-ok { background: var(--green-light); color: #0F6E56; }
.days-warn { background: var(--amber-light); color: var(--amber); }
.days-over { background: var(--red-light); color: var(--red); }
.progress-track { display: flex; gap: 2px; height: 4px; border-radius: 2px; margin-bottom: 6px; }
.pip { flex: 1; height: 4px; border-radius: 2px; background: #e0dedd; }
.pip.done { background: var(--green); }
.pip.active { background: var(--blue); }
.pip.inv { background: #639922; }
.pip.comp { background: #888; }
.progress-label { font-size: 11px; color: var(--muted); display: flex; justify-content: space-between; margin-bottom: 8px; }
.job-footer { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
.job-refs { font-size: 11px; color: var(--muted); flex: 1; font-family: 'DM Mono', monospace; }
.stage-select { font-size: 12px; padding: 5px 8px; border: 1px solid var(--border-strong); border-radius: 6px; font-family: inherit; background: var(--card); cursor: pointer; max-width: 220px; }
.btn-icon { background: none; border: 1px solid var(--border-strong); border-radius: 6px; width: 30px; height: 30px; display: flex; align-items: center; justify-content: center; cursor: pointer; color: var(--muted); font-size: 16px; }
.btn-icon:hover { border-color: var(--red); color: var(--red); background: var(--red-light); }
.btn-link { background: none; border: 1px solid var(--border-strong); border-radius: 6px; width: 30px; height: 30px; display: flex; align-items: center; justify-content: center; cursor: pointer; color: var(--muted); font-size: 14px; text-decoration: none; }
.btn-link:hover { border-color: var(--blue); color: var(--blue); }
.empty-state { text-align: center; padding: 3rem; color: var(--faint); font-size: 14px; }
.log-section { margin-top: 24px; }
.log-title { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em; color: var(--faint); margin-bottom: 8px; }
.log-box { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; max-height: 200px; overflow-y: auto; }
.log-entry { display: flex; gap: 12px; padding: 8px 14px; border-bottom: 1px solid var(--border); font-size: 12px; }
.log-entry:last-child { border-bottom: none; }
.log-time { color: var(--faint); font-family: 'DM Mono', monospace; font-size: 11px; white-space: nowrap; }
.log-auto { background: #E6F1FB; color: var(--blue); font-size: 10px; padding: 1px 6px; border-radius: 4px; font-weight: 600; white-space: nowrap; }
.modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 200; align-items: center; justify-content: center; padding: 20px; }
.modal-overlay.open { display: flex; }
.modal { background: var(--card); border-radius: var(--radius); padding: 24px; width: 100%; max-width: 440px; }
.modal-title { font-size: 16px; font-weight: 600; margin-bottom: 16px; }
.form-row { margin-bottom: 12px; }
.form-row label { font-size: 12px; font-weight: 500; color: var(--muted); display: block; margin-bottom: 4px; }
.form-row input, .form-row select { width: 100%; padding: 8px 12px; border: 1px solid var(--border-strong); border-radius: 6px; font-size: 13px; font-family: inherit; background: var(--card); }
.form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 20px; }
.loading { text-align: center; padding: 3rem; color: var(--muted); font-size: 14px; }

/* CUSTOMER TRACKER */
#tracker-view { display: none; }
.tracker-wrap { max-width: 500px; margin: 0 auto; padding: 24px 20px; }
.tracker-header { background: var(--blue); border-radius: var(--radius) var(--radius) 0 0; padding: 16px 20px; }
.tracker-header-logo { color: #fff; font-weight: 600; font-size: 18px; }
.tracker-header-sub { color: rgba(255,255,255,0.7); font-size: 12px; margin-top: 2px; }
.tracker-vehicle-card { background: var(--card); border: 1px solid var(--border); border-top: none; padding: 16px 20px; margin-bottom: 20px; border-radius: 0 0 var(--radius) var(--radius); }
.tracker-reg { display: inline-block; background: var(--gold); color: #1a1a1a; font-family: 'DM Mono', monospace; font-weight: 500; font-size: 16px; padding: 5px 16px; border-radius: 6px; letter-spacing: 3px; margin-bottom: 8px; border: 2px solid rgba(0,0,0,0.1); }
.tracker-vehicle-name { font-size: 17px; font-weight: 600; }
.tracker-customer { font-size: 13px; color: var(--muted); margin-top: 3px; }
.complete-banner { background: var(--green-light); border: 1px solid #5DCAA5; border-radius: var(--radius-sm); padding: 14px 16px; display: flex; align-items: center; gap: 10px; margin-bottom: 20px; }
.complete-banner-text { color: #0F6E56; font-size: 14px; font-weight: 500; }
.stage-list { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px 20px; margin-bottom: 20px; }
.stage-item { display: flex; align-items: flex-start; gap: 12px; }
.stage-line-wrap { display: flex; flex-direction: column; align-items: center; }
.stage-dot { width: 30px; height: 30px; border-radius: 50%; border: 2px solid var(--border-strong); background: var(--card); display: flex; align-items: center; justify-content: center; flex-shrink: 0; font-size: 13px; }
.stage-dot.done { background: var(--green); border-color: var(--green); color: #fff; }
.stage-dot.active { background: var(--blue); border-color: var(--blue); color: #fff; }
.stage-dot.pending { color: var(--faint); }
.stage-connector { width: 2px; height: 24px; background: var(--border-strong); margin: 2px 0; }
.stage-connector.done { background: var(--green); }
.stage-content { padding: 4px 0 24px; flex: 1; }
.stage-content-label { font-size: 14px; font-weight: 500; }
.stage-content-label.pending { color: var(--faint); font-weight: 400; }
.stage-content-label.active { color: var(--blue); }
.in-progress-pill { display: inline-block; background: #E6F1FB; color: var(--blue); font-size: 11px; font-weight: 600; padding: 2px 8px; border-radius: 20px; margin-left: 8px; }
.stage-content-sub { font-size: 12px; color: var(--muted); margin-top: 2px; }
.tracker-contact { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px 20px; text-align: center; font-size: 13px; color: var(--muted); }
.tracker-contact strong { color: var(--text); }
.tracker-not-found { text-align: center; padding: 3rem 1rem; }
.tracker-not-found h2 { font-size: 18px; margin-bottom: 8px; }

@media (max-width: 640px) {
  .stats-grid { grid-template-columns: repeat(2,1fr); }
  .form-grid { grid-template-columns: 1fr; }
}
</style>
</head>
<body>

<!-- ═══════════════════════════════════════════════ -->
<!-- ADMIN DASHBOARD                                  -->
<!-- ═══════════════════════════════════════════════ -->
<div id="admin-view">
  <header class="header">
    <div>
      <div class="header-logo">TRT Motors</div>
    </div>
    <div style="display:flex;gap:8px;align-items:center">
      <span style="color:rgba(255,255,255,0.7);font-size:11px"><span class="live-dot"></span>Live</span>
      <button class="btn-header" onclick="openModal('add-modal')">+ Add job</button>
      <button class="btn-header" onclick="refreshJobs()">↻ Refresh</button>
    </div>
  </header>

  <div class="container">
    <div class="stats-grid" id="stats-grid"></div>

    <div class="tabs">
      <button class="tab-btn active" onclick="setFilter('active',this)">Active</button>
      <button class="tab-btn" onclick="setFilter('invoiced',this)">Invoiced / Complete</button>
      <button class="tab-btn" onclick="setFilter('all',this)">All jobs</button>
    </div>

    <div class="toolbar">
      <div class="search-wrap">
        <span class="search-icon">⌕</span>
        <input type="text" id="search-input" placeholder="Search name, reg, vehicle…" oninput="renderJobs()">
      </div>
      <select class="filter-select" id="stage-filter" onchange="renderJobs()">
        <option value="">All stages</option>
      </select>
    </div>

    <div id="job-list"></div>

    <div class="log-section">
      <div class="log-title">Activity log</div>
      <div class="log-box" id="log-box"></div>
    </div>
  </div>
</div>

<!-- ═══════════════════════════════════════════════ -->
<!-- CUSTOMER TRACKER                                 -->
<!-- ═══════════════════════════════════════════════ -->
<div id="tracker-view">
  <div class="tracker-wrap">
    <div id="tracker-content"></div>
  </div>
</div>

<!-- LOADING -->
<div id="loading-view" class="loading">
  <p>Loading TRT Motors…</p>
</div>

<!-- ADD JOB MODAL -->
<div class="modal-overlay" id="add-modal">
  <div class="modal">
    <div class="modal-title">Add new job</div>
    <div class="form-grid">
      <div class="form-row"><label>Customer name</label><input id="f-name" placeholder="Mrs Jane Smith"></div>
      <div class="form-row"><label>Registration</label><input id="f-reg" placeholder="AB12 CDE" style="text-transform:uppercase"></div>
    </div>
    <div class="form-row"><label>Vehicle</label><input id="f-vehicle" placeholder="Ford Focus 1.0"></div>
    <div class="form-row"><label>Address</label><input id="f-addr" placeholder="1 High Street, Liverpool, L1 1AA"></div>
    <div class="form-grid">
      <div class="form-row"><label>Invoice number</label><input id="f-inv" placeholder="02603"></div>
      <div class="form-row"><label>ACG reference</label><input id="f-ref" placeholder="1432000"></div>
    </div>
    <div class="form-row"><label>Stage</label><select id="f-stage"></select></div>
    <div class="modal-actions">
      <button class="btn" onclick="closeModal('add-modal')">Cancel</button>
      <button class="btn btn-primary" onclick="addJob()">Add job</button>
    </div>
  </div>
</div>

<script>
// ─── CONFIG ───────────────────────────────────────────────
// Replace these with your actual Supabase details
const SUPABASE_URL = 'https://kgohkilvxqjfadhyasyk.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imtnb2hraWx2eHFqZmFkaHlhc3lrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg1MjA0ODIsImV4cCI6MjA5NDA5NjQ4Mn0.ayrANcSJVHjQ0rRJy-DzqO80XAVQ7uoiSv_RtrlQv-8';
const SITE_URL = window.location.origin;

// ─── STAGES ───────────────────────────────────────────────
const STAGES = [
  { label: 'Instructed',                      sub: 'Job instruction received from ACG' },
  { label: 'Vehicle on site',                 sub: 'Vehicle collected and with us' },
  { label: 'Stripped & estimated',            sub: 'Damage assessed and costed' },
  { label: 'Authorised',                      sub: 'Engineer has approved the repair' },
  { label: 'Parts on site',                   sub: 'All parts ordered and arrived' },
  { label: 'Body repair',                     sub: 'Panel and structural work underway' },
  { label: 'Prep for paint',                  sub: 'Surface preparation in progress' },
  { label: 'Paint',                           sub: 'Vehicle in the paint booth' },
  { label: 'Fit up',                          sub: 'Panels and trim being refitted' },
  { label: 'Polish',                          sub: 'Final finishing and detailing' },
  { label: 'Quality control',                 sub: 'Final inspection underway' },
  { label: 'Arranging delivery / collection', sub: 'Booking your vehicle return' },
  { label: 'Invoiced',                        sub: 'Invoice submitted to ACG' },
  { label: 'Complete',                        sub: 'Repair finished — all done' },
];

// ─── INIT ─────────────────────────────────────────────────
const { createClient } = supabase;
const db = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

let jobs = [];
let logs = [];
let currentFilter = 'active';

// Decide which view to show based on URL
const path = window.location.pathname;
const trackMatch = path.match(/\/track\/([A-Z0-9]+)/i);

if (trackMatch) {
  showTracker(trackMatch[1].toUpperCase().replace(/\s/g, ''));
} else {
  showAdmin();
}

// ─── ADMIN ────────────────────────────────────────────────
async function showAdmin() {
  document.getElementById('loading-view').style.display = 'none';
  document.getElementById('admin-view').style.display = 'block';
  populateStageSelects();
  await refreshJobs();
  // Live updates every 30 seconds
  setInterval(refreshJobs, 30000);
}

async function refreshJobs() {
  const { data, error } = await db.from('jobs').select('*').order('added_date', { ascending: false });
  if (error) { console.error(error); return; }
  jobs = data || [];
  renderJobs();
}

function daysSince(d) {
  return Math.floor((Date.now() - new Date(d)) / 86400000);
}

function pipClass(i, stage) {
  if (stage === 13) return i <= 13 ? 'comp' : '';
  if (stage === 12) return i < 12 ? 'done' : i === 12 ? 'inv' : '';
  if (i < stage) return 'done';
  if (i === stage) return 'active';
  return '';
}

function renderJobs() {
  const q = (document.getElementById('search-input').value || '').toLowerCase();
  const sf = document.getElementById('stage-filter').value;

  const filtered = jobs.filter(j => {
    const mq = !q || (j.name||'').toLowerCase().includes(q) || (j.reg||'').toLowerCase().includes(q) || (j.vehicle||'').toLowerCase().includes(q);
    const ms = sf === '' || j.stage === parseInt(sf);
    const mf = currentFilter === 'all' ? true : currentFilter === 'invoiced' ? j.stage >= 12 : j.stage < 12;
    return mq && ms && mf;
  });

  const el = document.getElementById('job-list');
  if (!filtered.length) {
    el.innerHTML = '<div class="empty-state">No jobs match your search</div>';
    renderStats();
    return;
  }

  el.innerHTML = filtered.map(j => {
    const days = daysSince(j.added_date);
    const dClass = days <= 7 ? 'days-ok' : days <= 14 ? 'days-warn' : 'days-over';
    const pips = STAGES.map((_, i) => `<div class="pip ${pipClass(i, j.stage)}"></div>`).join('');
    const pct = Math.round((j.stage / 13) * 100);
    const tags = [];
    if (j.auth_confirmed && j.stage >= 3) tags.push(`<span class="tag tag-auth">Auth ✓</span>`);
    else if (!j.auth_confirmed && j.stage < 3) tags.push(`<span class="tag tag-no-auth">Awaiting auth</span>`);
    if (j.stage >= 12) tags.push(`<span class="tag tag-inv">Invoiced</span>`);
    const opts = STAGES.map((s, i) => `<option value="${i}" ${j.stage===i?'selected':''}>${s.label}</option>`).join('');
    const trackerUrl = `${SITE_URL}/track/${(j.reg||'').replace(/\s/g,'')}`;

    return `
    <div class="job-card">
      <div class="job-header">
        <span class="reg-plate">${j.reg || '—'}</span>
        <div class="job-info">
          <div class="job-name">${j.name || '—'} ${tags.join('')}</div>
          <div class="job-vehicle">${j.vehicle || '—'}</div>
          <div class="job-addr">${j.address || ''}</div>
        </div>
        <span class="days-pill ${dClass}">${days}d</span>
      </div>
      <div class="progress-track">${pips}</div>
      <div class="progress-label">
        <span><strong>${STAGES[j.stage]?.label || '—'}</strong></span>
        <span>${pct}% complete</span>
      </div>
      <div class="job-footer">
        <span class="job-refs">
          ${j.invoice_number ? 'INV ' + j.invoice_number + ' · ' : ''}
          REF ${j.acg_ref || '—'}
          ${j.laird_ref ? ' · LAIRD ' + j.laird_ref : ''}
        </span>
        <select class="stage-select" onchange="updateStage('${j.id}', this.value)">${opts}</select>
        <a href="${trackerUrl}" target="_blank" class="btn-link" title="Customer tracker link">🔗</a>
        <button class="btn-icon" onclick="copyLink('${trackerUrl}')" title="Copy tracker link">📋</button>
        <button class="btn-icon" onclick="removeJob('${j.id}', '${(j.name||'').replace(/'/g,"\\'")}', '${j.reg||''}')" title="Remove job" style="color:var(--red)">✕</button>
      </div>
    </div>`;
  }).join('');

  renderStats();
}

function renderStats() {
  const inProg = jobs.filter(j => j.stage < 12).length;
  const inv = jobs.filter(j => j.stage === 12).length;
  const comp = jobs.filter(j => j.stage === 13).length;
  document.getElementById('stats-grid').innerHTML = `
    <div class="stat-card blue"><div class="stat-val">${inProg}</div><div class="stat-lbl">In progress</div></div>
    <div class="stat-card amber"><div class="stat-val">${inv}</div><div class="stat-lbl">Invoiced</div></div>
    <div class="stat-card green"><div class="stat-val">${comp}</div><div class="stat-lbl">Complete</div></div>
    <div class="stat-card gray"><div class="stat-val">${jobs.length}</div><div class="stat-lbl">Total jobs</div></div>
  `;
}

async function updateStage(id, stage) {
  const { error } = await db.from('jobs').update({ stage: parseInt(stage), updated_at: new Date().toISOString() }).eq('id', id);
  if (error) { alert('Error updating stage: ' + error.message); return; }
  const j = jobs.find(x => x.id === id);
  if (j) {
    j.stage = parseInt(stage);
    addLog(`${j.reg} — ${j.name} moved to "${STAGES[parseInt(stage)]?.label}"`, false);
  }
  renderJobs();
}

async function removeJob(id, name, reg) {
  if (!confirm(`Remove ${name} (${reg}) from dashboard?\n\nThis should only be done when remittance has been received from ACG.`)) return;
  const { error } = await db.from('jobs').delete().eq('id', id);
  if (error) { alert('Error removing job: ' + error.message); return; }
  jobs = jobs.filter(x => x.id !== id);
  addLog(`${reg} — ${name} removed from dashboard`, false);
  renderJobs();
}

async function addJob() {
  const name = document.getElementById('f-name').value.trim();
  const reg = document.getElementById('f-reg').value.trim().toUpperCase();
  const vehicle = document.getElementById('f-vehicle').value.trim();
  const address = document.getElementById('f-addr').value.trim();
  const invoice_number = document.getElementById('f-inv').value.trim();
  const acg_ref = document.getElementById('f-ref').value.trim();
  const stage = parseInt(document.getElementById('f-stage').value);
  if (!name || !reg || !vehicle) { alert('Please fill in name, registration and vehicle.'); return; }
  const { error } = await db.from('jobs').insert([{ name, reg, vehicle, address, invoice_number, acg_ref, stage, auth_confirmed: stage >= 3, added_date: new Date().toISOString().split('T')[0] }]);
  if (error) { alert('Error adding job: ' + error.message); return; }
  addLog(`New job added manually: ${reg} — ${name}`, false);
  closeModal('add-modal');
  ['f-name','f-reg','f-vehicle','f-addr','f-inv','f-ref'].forEach(id => document.getElementById(id).value = '');
  await refreshJobs();
}

function copyLink(url) {
  navigator.clipboard.writeText(url).then(() => {
    const btn = event.target;
    btn.textContent = '✓';
    setTimeout(() => btn.textContent = '📋', 1500);
  });
}

function setFilter(f, btn) {
  currentFilter = f;
  document.querySelectorAll('.tab-btn').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  renderJobs();
}

function addLog(msg, auto = false) {
  const now = new Date();
  const t = now.getHours().toString().padStart(2,'0') + ':' + now.getMinutes().toString().padStart(2,'0');
  logs.unshift({ t, msg, auto });
  const el = document.getElementById('log-box');
  if (el) el.innerHTML = logs.slice(0,20).map(l => `
    <div class="log-entry">
      <span class="log-time">${l.t}</span>
      ${l.auto ? '<span class="log-auto">AUTO</span>' : ''}
      <span style="color:var(--muted);${l.auto?'color:#185FA5;font-weight:500':''}">${l.msg}</span>
    </div>`).join('');
}

function populateStageSelects() {
  const opts = STAGES.map((s, i) => `<option value="${i}">${s.label}</option>`).join('');
  const sf = document.getElementById('stage-filter');
  if (sf) sf.innerHTML = '<option value="">All stages</option>' + opts;
  const fs = document.getElementById('f-stage');
  if (fs) fs.innerHTML = opts;
}

function openModal(id) { document.getElementById(id).classList.add('open'); }
function closeModal(id) { document.getElementById(id).classList.remove('open'); }
document.querySelectorAll('.modal-overlay').forEach(m => {
  m.addEventListener('click', e => { if (e.target === m) m.classList.remove('open'); });
});

// ─── CUSTOMER TRACKER ─────────────────────────────────────
async function showTracker(reg) {
  document.getElementById('loading-view').style.display = 'none';
  document.getElementById('tracker-view').style.display = 'block';

  const regSearch = reg.replace(/\s/g, '').toUpperCase();

  const { data, error } = await db.from('jobs').select('name,reg,vehicle,stage').ilike('reg', `%${regSearch}%`).limit(1);

  const el = document.getElementById('tracker-content');

  if (error || !data || data.length === 0) {
    el.innerHTML = `
      <div class="tracker-not-found">
        <div style="font-size:40px;margin-bottom:12px">🔍</div>
        <h2>Job not found</h2>
        <p style="color:var(--muted);font-size:13px">We couldn't find a job for registration <strong>${reg}</strong>.<br>Please call us on <strong>0151 207 9817</strong> if you need help.</p>
      </div>`;
    return;
  }

  const job = data[0];
  const stage = job.stage || 0;
  const isComplete = stage === 13;

  const stageItems = STAGES.map((s, i) => {
    const done = i < stage;
    const active = i === stage;
    const isLast = i === STAGES.length - 1;
    const dotClass = done ? 'done' : active ? 'active' : 'pending';
    const icon = done ? '✓' : active ? '▶' : '';
    const labelClass = done ? '' : active ? 'active' : 'pending';
    return `
      <div class="stage-item">
        <div class="stage-line-wrap">
          <div class="stage-dot ${dotClass}">${icon}</div>
          ${!isLast ? `<div class="stage-connector ${done ? 'done' : ''}"></div>` : ''}
        </div>
        <div class="stage-content" style="${isLast ? 'padding-bottom:0' : ''}">
          <span class="stage-content-label ${labelClass}">${s.label}${active ? '<span class="in-progress-pill">In progress</span>' : ''}</span>
          ${(done || active) ? `<div class="stage-content-sub">${s.sub}</div>` : ''}
        </div>
      </div>`;
  }).join('');

  el.innerHTML = `
    <div class="tracker-header">
      <div class="tracker-header-logo">TRT Motors</div>
      <div class="tracker-header-sub">Vehicle repair tracker</div>
    </div>
    <div class="tracker-vehicle-card">
      <div class="tracker-reg">${job.reg}</div>
      <div class="tracker-vehicle-name">${job.vehicle || 'Your vehicle'}</div>
      <div class="tracker-customer">${job.name}</div>
    </div>
    ${isComplete ? `
    <div class="complete-banner">
      <span style="font-size:20px">✅</span>
      <span class="complete-banner-text">Your vehicle is ready — we'll be in touch to arrange collection or delivery.</span>
    </div>` : ''}
    <div class="stage-list">${stageItems}</div>
    <div class="tracker-contact">
      Questions? Call us on <strong>0151 207 9817</strong><br>
      <span style="font-size:12px;margin-top:4px;display:block">Mon–Fri 8am–6pm · Sat 9am–1pm</span>
    </div>`;
}
</script>
